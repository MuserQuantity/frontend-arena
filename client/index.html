<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Frontend Arena — 用真实 LLM Arena 提示词实测各大模型的前端开发实力，并排浏览可交互的生成结果。"
    />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <!-- Geist fonts are self-hosted via @fontsource-variable (see main.tsx). -->
    <title>Frontend Arena — 大模型前端实力对比</title>
    <script>
      // Set the initial theme before paint to avoid a flash: an explicit
      // choice persisted from the header toggle wins, otherwise follow the
      // system preference. Kept in sync with ThemeContext.tsx.
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var dark =
            stored === "dark" ||
            (stored !== "light" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
